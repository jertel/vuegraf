name: 'Build'

on:
  push:
    branches:
      - master

  release:
    types: [created]

env:
  IMAGE_NAME: vuegraf

jobs:
  release:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'

    - name: Login
      env:
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      run: |
        echo "${DOCKER_PASSWORD}" | docker login --username ${DOCKER_USERNAME} --password-stdin

    - name: Test
      run: make test-docker

    - name: Install buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        version: latest

    - name: Build and Push
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      run: |
          echo "GITHUB_REF: ${GITHUB_REF}"
          [ -n "${GITHUB_REF}" ] && [ "${GITHUB_REF}" != "refs/heads/master" ] && TAG="${GITHUB_REF}" || TAG="latest"
          TAG=$(echo "$TAG" | sed -e 's,.*/\(.*\),\1,')
          echo "TAG: ${TAG}"
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker buildx build \
          --platform=linux/amd64,linux/arm64 \
          --output "type=image,push=true" \
          --file ./Dockerfile . \
          --tag $(echo "${DOCKER_USERNAME}" | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}:${TAG}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image to GitHub
      run: |
        docker build . --file Dockerfile --tag $IMAGE_NAME

        IMAGE_ID=ghcr.io/${{ github.repository }}/$IMAGE_NAME

        # Change all uppercase to lowercase
        IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')

        # Strip git ref prefix from version
        VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

        # Use Docker `latest` tag convention
        [ "$VERSION" == "master" ] && VERSION=latest

        echo IMAGE_ID=$IMAGE_ID
        echo VERSION=$VERSION

        # Push to GitHub Package
        docker tag $IMAGE_NAME $IMAGE_ID:$VERSION
        docker push $IMAGE_ID:$VERSION
